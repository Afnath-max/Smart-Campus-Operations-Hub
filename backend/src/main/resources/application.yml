spring:
  application:
    name: smart-campus-operations-hub-backend
  config:
    import: optional:file:./.env[.properties]
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/smart_campus_hub}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 15MB

server:
  servlet:
    session:
      cookie:
        http-only: true
        same-site: lax

app:
  frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
  csrf-cookie-name: XSRF-TOKEN
  uploads-directory: ${UPLOADS_DIRECTORY:./uploads}
  invitation-expiry-days: ${INVITATION_EXPIRY_DAYS:7}
  seed:
    enabled: ${APP_SEED_ENABLED:false}
    user-password: ${APP_SEED_USER_PASSWORD:User@12345}
    admin-password: ${APP_SEED_ADMIN_PASSWORD:Admin@12345}
    technician-password: ${APP_SEED_TECHNICIAN_PASSWORD:Tech@12345}
  cors:
    allowed-origins:
      - ${FRONTEND_BASE_URL:http://localhost:5173}

logging:
  level:
    org.springframework.security: INFO
