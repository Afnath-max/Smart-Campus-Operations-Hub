version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: smart_campus_hub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    depends_on:
      - postgres
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/smart_campus_hub
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      FRONTEND_BASE_URL: http://localhost:4173
      UPLOADS_DIRECTORY: /app/uploads
      APP_SEED_ENABLED: "true"
      APP_SEED_ADMIN_PASSWORD: Admin@12345
      APP_SEED_TECHNICIAN_PASSWORD: Tech@12345
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID: change-me
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET: change-me
    ports:
      - "8080:8080"
    volumes:
      - uploads-data:/app/uploads

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8080
    depends_on:
      - backend
    ports:
      - "4173:80"

volumes:
  postgres-data:
  uploads-data:
